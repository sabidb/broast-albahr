    #splash.fade{opacity:0;pointer-events:none}

    #splash .dot:nth-child(3){animation-delay:0.4s}
    @keyframes zoomIn{from{transform:scale(0.6);opacity:0}to{transform:scale(1);opacity:1}}
    @keyframes bounce{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}
    #root{min-height:100vh;background:#130000}

window.PLATFORM_FEE = function(subtotal) {
  if (subtotal >= 250) return Math.round(subtotal * 0.04 * 100) / 100;
  if (subtotal >= 100) return Math.round(subtotal * 0.03 * 100) / 100;
  return Math.round(subtotal * 0.02 * 100) / 100;
};

window.calcDistance = function(lat1, lon1, lat2, lon2) {
  var R = 6371;
  var dLat = (lat2-lat1) * Math.PI/180;
  var dLon = (lon2-lon1) * Math.PI/180;
  var a = Math.sin(dLat/2)*Math.sin(dLat/2) + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)*Math.sin(dLon/2);
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
};

window.getDeliveryFee = function(km) {
  for (var i=0; i<window.DELIVERY_ZONES.length; i++) {
    if (km <= window.DELIVERY_ZONES[i].maxKm) return window.DELIVERY_ZONES[i].fee;
  }
  return -1;
};
